<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #080808;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #ff7a00;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
        }
        button:hover {
            background: #ff5a00;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>ورود به داشبورد</h2>
        <input type="password" id="password" placeholder="رمز عبور را وارد کنید">
        <button onclick="checkPassword()">ورود</button>
    </div>

    <script>
        function checkPassword() {
            const password = document.getElementById('password').value;
            const correctPassword = 'pedram123'; // این رو با رمز دلخواه خودت عوض کن

            if (password === correctPassword) {
                window.location.href = 'dashboard.html';
            } else {
                alert('رمز عبور نادرست است!');
            }
        }
    </script>
</body>
</html>
